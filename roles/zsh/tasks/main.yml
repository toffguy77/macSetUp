---
- name: Install zsh
  homebrew:
    name:
      - zsh
    state: latest
  when: ansible_os_family == 'Darwin'
  tags: zsh

- name: Add zsh to list of shells
  lineinfile: >
    backup=yes
    dest=/etc/shells
    regexp=^/usr/local/bin/zsh
    line=/usr/local/bin/zsh
  when: ansible_os_family == 'Darwin'
  become: true

- name: Change to zsh (Mac)
  shell: chsh -s /usr/local/bin/zsh {{ ansible_env.USER }}
  when: ansible_os_family == 'Darwin'

- name: Change to zsh (Ubuntu)
  shell: chsh -s /usr/bin/zsh {{ ansible_env.USER }}
  when: ansible_os_family == 'Ubuntu'

- name: Install oh-my-zsh
  git: repo=https://github.com/robbyrussell/oh-my-zsh.git
       dest=~/.oh-my-zsh
       recursive=yes
  tags: zsh

- name: Ensure oh-my-zsh-custom directory
  file:
    name: ~/.oh-my-zsh-custom
    state: directory
  tags: zsh

- name: Add zshrc file
  copy: src=zshrc dest=~/.zshrc
  tags: zsh

- name: Install zsh-syntax-highlighting plugin
  homebrew:
    name:
      - zsh-syntax-highlighting
    state: latest
  when: ansible_os_family == 'Darwin'
  tags: zsh

- name: Install zsh git plugin
  git: repo=https://github.com/davidde/git.git
       dest=~/.oh-my-zsh/custom/plugins/
       recursive=yes
  when: ansible_os_family == 'Darwin'
  tags: zsh

- name: Install zsh history search
  git:  repo=https://github.com/marlonrichert/zsh-autocomplete.git
        dest=~/.oh-my-zsh/custom/plugins
        recursive=yes
  when: ansible_os_family == 'Darwin'
  tags: zsh
